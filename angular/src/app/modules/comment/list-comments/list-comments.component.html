<div class="container py-4">

  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h4 class="mb-0">Comments</h4>
      <small class="text-muted">{{ comments.length }} comments on this task</small>
    </div>
  </div>

  <div class="d-flex flex-column gap-3 mb-4">
    <div *ngFor="let comment of comments"
         class="card border shadow-none">
      <div class="card-body">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <div class="d-flex align-items-center gap-2">
            <div class="rounded-circle bg-primary bg-opacity-10 text-primary d-flex align-items-center justify-content-center"
                 style="width:36px; height:36px; font-size:13px; font-weight:500;">
              {{ comment.creatorUserName?.slice(0,2)?.toUpperCase() }}
            </div>
            <div>
              <p class="mb-0 fw-medium">{{ comment.creatorUserName }}</p>
              <small class="text-muted">{{ comment.creationTime | date:'short' }}</small>
            </div>
          </div>
          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-light" (click)="OnChangeComment(comment.id, comment)">
              <i class="fa fa-edit"></i>
            </button>
            <button class="btn btn-sm btn-light text-danger" (click)="OnDeleteComment(comment.id)">
              <i class="fa fa-trash"></i>
            </button>
          </div>
        </div>
        <p class="mb-0 text-body">{{ comment.content }}</p>
      </div>
    </div>
  </div>

  <div *ngIf="comments.length === 0" class="text-center text-muted py-5">
    <i class="fa fa-comments fa-2x mb-3 d-block"></i>
    No comments yet. Be the first to comment!
  </div>

</div>
